<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devnex AI CRM - Login</title>

    <link rel="stylesheet" href="/css/login.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

    <section class="login-container">

        <!-- LEFT SIDE -->

        <div class="login-left">

            <div class="brand">

                <h1>
                    Devnex<span>AI CRM</span>
                </h1>

                <p>
                    Securely manage projects, clients,
                    teams and AI workflows from one dashboard.
                </p>

            </div>

            <div class="feature-list">

                <div class="feature">

                    <i class="ri-check-line"></i>

                    <span>Role Based Access</span>

                </div>

                <div class="feature">

                    <i class="ri-check-line"></i>

                    <span>Client Management</span>

                </div>

                <div class="feature">

                    <i class="ri-check-line"></i>

                    <span>AI Automation Tools</span>

                </div>

                <div class="feature">

                    <i class="ri-check-line"></i>

                    <span>Project Tracking</span>

                </div>

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="login-right">

            <form class="login-form">

                <h2>Welcome Back</h2>

                <p>
                    Login to your account
                </p>

                <div class="input-box">

                    <i class="ri-mail-line"></i>

                    <input
                        type="email"
                        placeholder="Enter Email"
                    >

                </div>

                <div class="input-box">

                    <i class="ri-lock-line"></i>

                    <input
                        type="password"
                        placeholder="Enter Password"
                    >

                </div>

                <div class="options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>

                <button class="login-btn-main">

                    Login

                </button>

                <p class="signup-link">

                    Don't have an account?

                    <a href="signup.html">
                        Signup
                    </a>

                </p>

            </form>

        </div>

    </section>

</body>

</html>
